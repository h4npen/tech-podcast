<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech News Chronicle - 週刊テックニュース</title>
  <meta name="description" content="ずんだもんと四国めたんが毎週最新テックニュースをお届け。毎日の注目記事も確認できます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&family=M+PLUS+1+Code:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* =============================================
       RESET & ROOT
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ff-black:    #0a0a1a;
      --ff-darkblue: #060c24;
      --ff-navy:     #101840;
      --ff-blue:     #1a2c6e;
      --ff-midblue:  #2a4090;
      --ff-window:   #08112b;
      --ff-border:   #4a6fd4;
      --ff-border2:  #7090ff;
      --ff-gold:     #f0c030;
      --ff-gold2:    #ffd84a;
      --ff-white:    #e8e8f8;
      --ff-silver:   #a8b8d8;
      --ff-red:      #d04040;
      --ff-green:    #40c040;
      --ff-cyan:     #40d0d0;
      --ff-purple:   #9040c0;
      --ff-crystal:  #60b8ff;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--ff-black);
      color: var(--ff-white);
      font-family: 'M PLUS 1 Code', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* =============================================
       STARFIELD BACKGROUND
    ============================================= */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: var(--ff-white);
      border-radius: 50%;
      animation: twinkle var(--dur, 3s) var(--delay, 0s) infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: 0.9; transform: scale(1.2); }
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
    }

    /* everything else above scanlines */
    header, nav, main, footer, .modal-overlay { position: relative; z-index: 2; }

    /* =============================================
       FF WINDOW MIXIN (共通ウィンドウスタイル)
    ============================================= */
    .ff-window {
      background: var(--ff-window);
      border: 3px solid var(--ff-border);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.05),
        0 0 0 1px var(--ff-navy),
        0 0 20px rgba(74,111,212,0.3),
        0 4px 40px rgba(0,0,0,0.8);
      position: relative;
    }
    /* コーナーデコレーション */
    .ff-window::before,
    .ff-window::after {
      content: '◆';
      position: absolute;
      color: var(--ff-gold);
      font-size: 10px;
      line-height: 1;
    }
    .ff-window::before { top: -7px; left: -1px; }
    .ff-window::after  { bottom: -7px; right: -1px; }

    /* =============================================
       HEADER
    ============================================= */
    header {
      background:
        radial-gradient(ellipse 100% 80% at 50% 120%, #1a2c6e 0%, transparent 70%),
        linear-gradient(180deg, #060c24 0%, #0a0a1a 100%);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
      border-bottom: 3px solid var(--ff-border);
      box-shadow: 0 4px 40px rgba(74,111,212,0.4);
    }

    /* クリスタル */
    .crystal-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .crystal {
      width: 20px;
      height: 28px;
      clip-path: polygon(50% 0%, 100% 35%, 100% 75%, 50% 100%, 0% 75%, 0% 35%);
      animation: crystal-pulse 2s ease-in-out infinite;
    }
    .crystal-fire   { background: linear-gradient(180deg, #ff8060, #ff2020); animation-delay: 0s;    }
    .crystal-ice    { background: linear-gradient(180deg, #a0e8ff, #4090ff); animation-delay: 0.5s;  }
    .crystal-thunder{ background: linear-gradient(180deg, #ffe060, #f0a000); animation-delay: 1s;    }
    .crystal-wind   { background: linear-gradient(180deg, #80ff80, #20a020); animation-delay: 1.5s;  }
    .crystal-earth  { background: linear-gradient(180deg, #c09040, #604810); animation-delay: 0.25s; }
    .crystal-water  { background: linear-gradient(180deg, #60c0ff, #0040c0); animation-delay: 0.75s; }
    @keyframes crystal-pulse {
      0%, 100% { opacity: 0.7; filter: brightness(0.9) drop-shadow(0 0 4px currentColor); transform: scale(1); }
      50%       { opacity: 1.0; filter: brightness(1.4) drop-shadow(0 0 10px currentColor); transform: scale(1.1); }
    }

    .title-logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.9rem, 3vw, 1.6rem);
      color: var(--ff-gold);
      text-shadow:
        2px 2px 0 #804000,
        0 0 20px rgba(240,192,48,0.6),
        0 0 40px rgba(240,192,48,0.3);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      animation: title-glow 3s ease-in-out infinite;
    }
    @keyframes title-glow {
      0%, 100% { text-shadow: 2px 2px 0 #804000, 0 0 20px rgba(240,192,48,0.5); }
      50%       { text-shadow: 2px 2px 0 #804000, 0 0 30px rgba(240,192,48,0.9), 0 0 60px rgba(240,192,48,0.4); }
    }

    .title-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.45rem, 1.5vw, 0.65rem);
      color: var(--ff-silver);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
    }

    .party-badges {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .party-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      padding: 0.4rem 0.8rem;
      background: var(--ff-navy);
      border: 2px solid var(--ff-border);
      color: var(--ff-silver);
      letter-spacing: 0.05em;
    }
    .party-badge.hero { border-color: var(--ff-gold); color: var(--ff-gold2); }

    .header-commands {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .cmd-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 0.6rem 1.2rem;
      background: var(--ff-blue);
      border: 2px solid var(--ff-border2);
      color: var(--ff-white);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.15s;
      letter-spacing: 0.05em;
      position: relative;
    }
    .cmd-btn::before { content: '▶'; color: var(--ff-gold); font-size: 0.5rem; }
    .cmd-btn:hover {
      background: var(--ff-midblue);
      border-color: var(--ff-gold);
      color: var(--ff-gold2);
      box-shadow: 0 0 12px rgba(240,192,48,0.4);
    }
    .cmd-btn:active { transform: scale(0.97); }

    /* =============================================
       TAB NAV (コマンドメニュー風)
    ============================================= */
    .tab-nav {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 0;
      border-bottom: 3px solid var(--ff-border);
      background: var(--ff-darkblue);
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .tab-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 0.9rem 2rem;
      background: transparent;
      border: none;
      border-right: 1px solid var(--ff-border);
      color: var(--ff-silver);
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: inherit;
      position: relative;
    }
    .tab-btn .cursor { color: var(--ff-gold); opacity: 0; transition: opacity 0.1s; }
    .tab-btn:hover .cursor, .tab-btn.active .cursor { opacity: 1; }
    .tab-btn:hover { background: rgba(74,111,212,0.15); color: var(--ff-white); }
    .tab-btn.active {
      background: var(--ff-blue);
      color: var(--ff-gold2);
      border-bottom: 3px solid var(--ff-gold);
      margin-bottom: -3px;
    }

    /* =============================================
       MAIN LAYOUT
    ============================================= */
    .container {
      max-width: 1320px;
      margin: 1.5rem auto;
      padding: 0 1.25rem;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.5rem;
      flex-grow: 1;
    }
    @media (max-width: 860px) { .container { grid-template-columns: 1fr; } }

    .tab-panel { display: none; }
    .tab-panel.active { display: contents; }

    /* =============================================
       SIDEBAR LABEL
    ============================================= */
    .sidebar-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--ff-silver);
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    /* =============================================
       EPISODE LIST
    ============================================= */
    .episode-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .episode-card {
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 3px solid transparent;
      border-bottom: 1px solid var(--ff-navy);
      background: rgba(16, 24, 64, 0.5);
    }
    .episode-card:hover {
      background: var(--ff-blue);
      border-left-color: var(--ff-gold);
      padding-left: 1.25rem;
    }
    .episode-card.active {
      background: var(--ff-blue);
      border-left-color: var(--ff-gold2);
      box-shadow: inset 4px 0 0 var(--ff-gold2);
    }
    .episode-card-inner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .ep-cursor {
      color: var(--ff-gold);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .episode-card:hover .ep-cursor,
    .episode-card.active .ep-cursor { opacity: 1; }
    .ep-info { flex: 1; }
    .episode-date {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: var(--ff-silver);
      margin-bottom: 0.3rem;
      letter-spacing: 0.05em;
    }
    .episode-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--ff-white);
    }

    /* =============================================
       EPISODE DETAIL
    ============================================= */
    .episode-detail {
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      height: fit-content;
    }
    .detail-header { border-bottom: 2px solid var(--ff-border); padding-bottom: 1.25rem; }
    .detail-date {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: var(--ff-gold);
      margin-bottom: 0.5rem;
      letter-spacing: 0.08em;
    }
    .detail-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.6rem, 2vw, 0.95rem);
      color: var(--ff-white);
      line-height: 1.8;
    }

    .player-container {
      background: rgba(0,0,0,0.3);
      border: 2px solid var(--ff-midblue);
      padding: 1.25rem;
    }
    .player-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: var(--ff-silver);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: 0.08em;
    }
    audio {
      width: 100%;
      filter: hue-rotate(200deg) saturate(0.8);
    }

    .section-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      color: var(--ff-gold);
      letter-spacing: 0.08em;
      border-bottom: 2px solid var(--ff-border);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* =============================================
       NEWS CARDS (shared)  ← ここに日付を追加
    ============================================= */
    .news-card {
      border: 2px solid var(--ff-border);
      padding: 1.1rem 1.25rem;
      transition: all 0.15s;
      margin-bottom: 0.75rem;
      background: rgba(10,18,48,0.6);
      position: relative;
    }
    .news-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--ff-border);
      transition: background 0.15s, width 0.15s;
    }
    .news-card:hover { border-color: var(--ff-border2); background: rgba(26,44,110,0.5); }
    .news-card:hover::before { background: var(--ff-gold); width: 4px; }

    /* カード右上の日付バッジ */
    .news-card-date {
      position: absolute;
      top: 0.6rem;
      right: 0.75rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--ff-silver);
      letter-spacing: 0.05em;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--ff-border);
      padding: 0.2rem 0.45rem;
    }

    .news-source {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--ff-cyan);
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .news-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.5;
      padding-right: 5rem; /* 日付バッジの分のスペース */
    }
    .news-summary {
      font-size: 0.85rem;
      color: var(--ff-silver);
      line-height: 1.7;
      margin-bottom: 0.75rem;
    }
    .news-link {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--ff-crystal);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }
    .news-link::before { content: '▶'; color: var(--ff-gold); font-size: 0.35rem; }
    .news-link:hover { color: var(--ff-gold2); }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(240,192,48,0.12);
      border: 1px solid rgba(240,192,48,0.35);
      color: var(--ff-gold);
      padding: 0.15rem 0.5rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.38rem;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }

    /* =============================================
       DAILY NEWS SIDEBAR
    ============================================= */
    .daily-sidebar { display: flex; flex-direction: column; gap: 0.4rem; }
    .day-btn {
      font-family: 'M PLUS 1 Code', monospace;
      background: rgba(16, 24, 64, 0.5);
      border: 2px solid var(--ff-border);
      border-left: 3px solid transparent;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      color: var(--ff-silver);
      font-size: 0.9rem;
    }
    .day-btn:hover {
      background: var(--ff-blue);
      border-color: var(--ff-border2);
      border-left-color: var(--ff-cyan);
      color: var(--ff-white);
    }
    .day-btn.active {
      background: var(--ff-blue);
      border-color: var(--ff-border2);
      border-left-color: var(--ff-gold);
      color: var(--ff-gold2);
    }
    .day-btn-date {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
      letter-spacing: 0.05em;
    }
    .day-btn-count {
      font-size: 0.75rem;
      color: var(--ff-silver);
    }
    .day-btn.active .day-btn-count { color: rgba(240,192,48,0.7); }
    .today-tag {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      background: var(--ff-gold);
      color: #000;
      padding: 0.15rem 0.4rem;
      margin-left: 0.5rem;
    }

    /* =============================================
       DAILY DETAIL HEADER
    ============================================= */
    .daily-detail { padding: 1.75rem; height: fit-content; }
    .daily-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--ff-border);
    }
    .daily-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.5rem, 2vw, 0.85rem);
      color: var(--ff-gold2);
      line-height: 1.8;
      letter-spacing: 0.05em;
    }
    .daily-count {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: var(--ff-silver);
      letter-spacing: 0.05em;
    }

    /* HP/MPバー風の「記事数インジケーター」 */
    .article-bar-wrap {
      margin-top: 0.75rem;
    }
    .article-bar-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--ff-cyan);
      margin-bottom: 0.3rem;
      letter-spacing: 0.06em;
    }
    .article-bar {
      height: 8px;
      background: var(--ff-navy);
      border: 1px solid var(--ff-border);
      position: relative;
      overflow: hidden;
    }
    .article-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #40c0ff, #80e8ff);
      transition: width 0.6s ease;
      position: relative;
    }
    .article-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 4px; height: 100%;
      background: #fff;
      opacity: 0.7;
      animation: bar-shine 1.5s ease-in-out infinite;
    }
    @keyframes bar-shine {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0.2; }
    }

    /* =============================================
       EMPTY / LOADING
    ============================================= */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--ff-silver);
    }
    .empty-icon {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.5rem;
      display: block;
      margin-bottom: 1rem;
      color: var(--ff-border);
      animation: blink 1.2s step-end infinite;
    }
    .empty-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      letter-spacing: 0.08em;
      line-height: 2;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .loading-bar {
      display: inline-flex;
      gap: 4px;
      margin-top: 1rem;
    }
    .loading-bar span {
      width: 10px; height: 10px;
      background: var(--ff-gold);
      display: block;
      animation: loading-bounce 0.8s ease-in-out infinite;
    }
    .loading-bar span:nth-child(2) { animation-delay: 0.1s; background: var(--ff-crystal); }
    .loading-bar span:nth-child(3) { animation-delay: 0.2s; background: var(--ff-green); }
    .loading-bar span:nth-child(4) { animation-delay: 0.3s; background: var(--ff-red); }
    @keyframes loading-bounce {
      0%, 80%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      40%           { transform: scaleY(1.2); opacity: 1; }
    }

    /* =============================================
       FOOTER
    ============================================= */
    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 3px solid var(--ff-border);
      background: var(--ff-darkblue);
      margin-top: auto;
    }
    .footer-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: var(--ff-silver);
      letter-spacing: 0.08em;
      line-height: 2.5;
    }
    .footer-crystal { color: var(--ff-gold); }

    /* =============================================
       SCROLLBAR
    ============================================= */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--ff-darkblue); }
    ::-webkit-scrollbar-thumb { background: var(--ff-border); border: 1px solid var(--ff-black); }
    ::-webkit-scrollbar-thumb:hover { background: var(--ff-border2); }
  </style>
</head>
<body>

  <!-- スターフィールド -->
  <div id="starfield"></div>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="crystal-row">
      <div class="crystal crystal-fire"></div>
      <div class="crystal crystal-ice"></div>
      <div class="crystal crystal-thunder"></div>
      <div class="crystal crystal-wind"></div>
      <div class="crystal crystal-earth"></div>
      <div class="crystal crystal-water"></div>
    </div>
    <h1 class="title-logo">TECH NEWS CHRONICLE</h1>
    <p class="title-sub">- WEEKLY TECH PODCAST &amp; DAILY NEWS -</p>
    <div class="party-badges">
      <span class="party-badge hero">♦ ZUNDAMON  Lv.99</span>
      <span class="party-badge hero">♦ METAN     Lv.99</span>
      <span class="party-badge">★ AUTO GENERATED</span>
      <span class="party-badge">★ DAILY UPDATE</span>
    </div>
    <div class="header-commands">
      <a id="btn-apple-podcast" href="#" class="cmd-btn">APPLE PODCAST</a>
      <button id="btn-copy-rss" class="cmd-btn">COPY RSS FEED</button>
    </div>
  </header>

  <!-- ===== TAB NAV ===== -->
  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" id="tab-podcast" role="tab" onclick="switchTab('podcast')">
      <span class="cursor">▶</span> PODCAST
    </button>
    <button class="tab-btn" id="tab-daily" role="tab" onclick="switchTab('daily')">
      <span class="cursor">▶</span> DAILY NEWS
    </button>
  </nav>

  <!-- ===== PODCAST PANEL ===== -->
  <div id="panel-podcast" role="tabpanel" class="tab-panel active">
    <main class="container">
      <div>
        <p class="sidebar-label">- EPISODE SELECT -</p>
        <div class="ff-window episode-list" id="episode-list-container">
          <div class="empty-state">
            <div class="loading-bar"><span></span><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
      <div class="ff-window episode-detail" id="episode-detail-container">
        <div class="empty-state">
          <span class="empty-icon">♪</span>
          <p class="empty-text">SELECT AN EPISODE</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== DAILY NEWS PANEL ===== -->
  <div id="panel-daily" role="tabpanel" class="tab-panel">
    <main class="container">
      <div>
        <p class="sidebar-label">- DATE SELECT -</p>
        <div class="ff-window daily-sidebar" id="daily-date-list" style="padding: 0.5rem;">
          <div class="empty-state" style="padding:2rem 0;">
            <div class="loading-bar"><span></span><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
      <div class="ff-window daily-detail" id="daily-articles-container">
        <div class="empty-state">
          <span class="empty-icon">📅</span>
          <p class="empty-text">SELECT A DATE</p>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p class="footer-text">
      <span class="footer-crystal">◆ ◆ ◆</span><br>
      TECH NEWS CHRONICLE &copy; 2026<br>
      POWERED BY GEMINI API &amp; VOICEVOX ENGINE<br>
      <span class="footer-crystal">◆ ◆ ◆</span>
    </p>
  </footer>

  <script>
    /* ===== STARFIELD ===== */
    (function() {
      const sf = document.getElementById('starfield');
      for (let i = 0; i < 120; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() < 0.8 ? 1 : Math.random() < 0.5 ? 2 : 3;
        s.style.cssText = `
          width:${size}px; height:${size}px;
          top:${Math.random()*100}%;
          left:${Math.random()*100}%;
          --dur:${2 + Math.random()*4}s;
          --delay:${Math.random()*4}s;
        `;
        sf.appendChild(s);
      }
    })();

    /* ===== BASE URL / RSS ===== */
    const baseUrl = `${location.protocol}//${location.host}${location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '')}`;
    const rssUrl = `${baseUrl}/podcast.xml`;
    document.getElementById('btn-apple-podcast').href = rssUrl.replace(/^https?:\/\//, 'pcast://');
    document.getElementById('btn-copy-rss').addEventListener('click', () => {
      navigator.clipboard.writeText(rssUrl).then(() =>
        alert('▶ RSS FEED URL COPIED!\nペーストしてポッドキャストアプリに登録してください。')
      );
    });

    /* ===== TAB SWITCH ===== */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
      if (tab === 'daily' && !dailyLoaded) loadDailyNews();
    }

    /* ===== UTILS ===== */
    function fmtDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const today = new Date(); today.setHours(0,0,0,0);
      return {
        label: `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`,
        isToday: d.getTime() === today.getTime()
      };
    }
    function fmtFetched(isoStr) {
      if (!isoStr) return '';
      try {
        const d = new Date(isoStr);
        if (isNaN(d)) return '';
        return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
      } catch { return ''; }
    }
    function getArticleDate(art) {
      // published_at（記事の公開日）を優先し、なければfetched_atで代替
      return fmtFetched(art.published_at || art.fetched_at || '');
    }
    function getDomain(url) {
      try { return new URL(url).hostname.replace('www.',''); } catch { return 'WEB'; }
    }

    /* ===== PODCAST ===== */
    let episodesData = [];

    function selectEpisode(i) {
      const ep = episodesData[i];
      document.querySelectorAll('.episode-card').forEach((c, j) =>
        c.classList.toggle('active', j === i)
      );
      const { label } = fmtDate(ep.date);
      let newsHtml = '';
      if (ep.articles && ep.articles.length > 0) {
        newsHtml = ep.articles.map(a => `
          <div class="news-card">
            <div class="news-source">${getDomain(a.url)}</div>
            <div class="news-title">${a.title}</div>
            <p class="news-summary">${a.summary || '▶ 詳細は音声でお聞きください。'}</p>
            <a href="${a.url}" target="_blank" rel="noopener noreferrer" class="news-link">READ ARTICLE</a>
          </div>
        `).join('');
      } else {
        newsHtml = '<p class="empty-text" style="font-size:0.45rem;color:var(--ff-silver);">NO ARTICLES</p>';
      }
      document.getElementById('episode-detail-container').innerHTML = `
        <div class="detail-header">
          <div class="detail-date">◆ ${label}</div>
          <h2 class="detail-title">WEEKLY TECH NEWS<br>${label}</h2>
        </div>
        <div class="player-container">
          <p class="player-label">♪ NOW PLAYING</p>
          <audio controls src="${ep.audio_file}"></audio>
        </div>
        <div>
          <h3 class="section-title">◆ FEATURED ARTICLES</h3>
          ${newsHtml}
        </div>
      `;
    }

    async function loadEpisodes() {
      try {
        const r = await fetch('episodes.json');
        if (!r.ok) throw new Error();
        episodesData = await r.json();
        const el = document.getElementById('episode-list-container');
        if (!episodesData.length) {
          el.innerHTML = '<div class="empty-state"><p class="empty-text">NO EPISODES YET</p></div>';
          return;
        }
        el.innerHTML = episodesData.map((ep, i) => {
          const { label } = fmtDate(ep.date);
          return `
            <div class="episode-card" onclick="selectEpisode(${i})">
              <div class="episode-card-inner">
                <span class="ep-cursor">▶</span>
                <div class="ep-info">
                  <div class="episode-date">${label}</div>
                  <div class="episode-title">週刊テックニュース</div>
                </div>
              </div>
            </div>
          `;
        }).join('');
        selectEpisode(0);
      } catch {
        document.getElementById('episode-list-container').innerHTML =
          '<div class="empty-state"><p class="empty-text">LOAD FAILED</p></div>';
      }
    }

    /* ===== DAILY NEWS ===== */
    let dailyData = [];
    let dailyLoaded = false;

    function renderDay(i) {
      const day = dailyData[i];
      document.querySelectorAll('.day-btn').forEach((b, j) =>
        b.classList.toggle('active', j === i)
      );
      const { label, isToday } = fmtDate(day.date);
      const arts = day.articles || [];
      const max = 50;
      const pct = Math.min(100, Math.round(arts.length / max * 100));

      let html = '';
      if (arts.length) {
        html = arts.map(a => {
          const dateTag = getArticleDate(a);
          return `
            <div class="news-card">
              ${dateTag ? `<div class="news-card-date">${dateTag}</div>` : ''}
              ${a.score > 0 ? `<div class="score-badge">★ SCORE ${a.score}</div>` : ''}
              <div class="news-source">${getDomain(a.url)}</div>
              <div class="news-title">${a.title}</div>
              ${a.summary ? `<p class="news-summary">${a.summary}</p>` : ''}
              <a href="${a.url}" target="_blank" rel="noopener noreferrer" class="news-link">READ ARTICLE</a>
            </div>
          `;
        }).join('');
      } else {
        html = '<div class="empty-state"><span class="empty-icon">?</span><p class="empty-text">NO ARTICLES</p></div>';
      }

      document.getElementById('daily-articles-container').innerHTML = `
        <div class="daily-header">
          <div>
            <div class="daily-title">◆ ${label}${isToday ? ' <span style="font-size:0.5rem;color:var(--ff-green);">[TODAY]</span>' : ''}</div>
            <div class="daily-count">${arts.length} ARTICLES FOUND</div>
            <div class="article-bar-wrap">
              <div class="article-bar-label">ARTICLE INDEX ▌${arts.length}/${max}</div>
              <div class="article-bar"><div class="article-bar-fill" style="width:${pct}%;"></div></div>
            </div>
          </div>
        </div>
        ${html}
      `;
    }

    async function loadDailyNews() {
      dailyLoaded = true;
      try {
        const r = await fetch('daily_news.json');
        if (!r.ok) throw new Error();
        dailyData = await r.json();
        const el = document.getElementById('daily-date-list');
        if (!dailyData.length) {
          el.innerHTML = '<div class="empty-state" style="padding:1rem;"><p class="empty-text">NO DATA YET</p></div>';
          return;
        }
        el.innerHTML = dailyData.map((d, i) => {
          const { label, isToday } = fmtDate(d.date);
          const cnt = (d.articles || []).length;
          return `
            <button class="day-btn" onclick="renderDay(${i})">
              <span class="day-btn-date">${label}${isToday ? '<span class="today-tag">TODAY</span>' : ''}</span>
              <span class="day-btn-count">▌${cnt} articles</span>
            </button>
          `;
        }).join('');
        renderDay(0);
      } catch {
        document.getElementById('daily-date-list').innerHTML =
          '<div class="empty-state" style="padding:1rem;"><p class="empty-text" style="font-size:0.4rem;line-height:2.5;">DAILY_NEWS.JSON<br>NOT FOUND<br>NEXT FETCH WILL<br>GENERATE DATA.</p></div>';
        document.getElementById('daily-articles-container').innerHTML = '';
      }
    }

    window.addEventListener('DOMContentLoaded', loadEpisodes);
  </script>
</body>
</html>
