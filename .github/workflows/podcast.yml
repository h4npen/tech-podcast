name: Tech Podcast System (Daily Pool & Weekly Build)

on:
  schedule:
    # デイリー収集（月〜土の日本時間朝6:30 JST ➔ 日〜金の21:30 UTC）
    - cron: '30 21 * * 0-5'
    # ウィークリー配信（日曜の日本時間朝6:30 JST ➔ 土曜の21:30 UTC）
    - cron: '30 21 * * 6'
  workflow_dispatch: # 手動実行用（デフォルトでbuildモード実行）

permissions:
  contents: write

jobs:
  build-podcast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (ffmpeg)
      # 音声結合時に必要なのでbuildモードのときのみffmpegをインストール
      if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 21 * * 6'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser pydub

    - name: Start VOICEVOX Engine (Docker CPU version)
      # buildモードのときのみVOICEVOX Dockerコンテナを起動
      if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 21 * * 6'
      run: |
        docker run -d -p 50021:50021 voicevox/voicevox_engine:cpu-latest
        echo "VOICEVOX Engine container started."

    - name: Run make_podcast.py
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
      run: |
        # 手動実行、または土曜21:30 UTC（日曜朝6:30 JST）の時はbuildを実行
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.schedule }}" = "30 21 * * 6" ]; then
          echo "Mode: BUILD (Weekly Podcast Production)"
          python make_podcast.py --mode build
        else
          echo "Mode: FETCH (Daily News Pooling)"
          python make_podcast.py --mode fetch
        fi

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # フォルダが存在しない場合のエラーを防ぐ
        mkdir -p podcasts
        
        # 存在する場合のみ git add を実行する
        if [ -d podcasts ]; then git add podcasts/; fi
        if [ -f podcast.xml ]; then git add podcast.xml; fi
        if [ -f podcast_history.json ]; then git add podcast_history.json; fi
        if [ -f carryover.json ]; then git add carryover.json; fi
        if [ -f episodes.json ]; then git add episodes.json; fi
        if [ -f daily_news.json ]; then git add daily_news.json; fi
        
        if ! git diff --cached --quiet; then
          git commit -m "Automated update (daily pool / weekly build)"
          git push origin HEAD:${{ github.ref }}
          echo "Changes committed and pushed."
        else
          echo "No new changes to commit."
        fi
